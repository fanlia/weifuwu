<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wefu demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
    #root { max-width: 600px; margin: 0 auto; padding: 0 16px; }

    /* Nav */
    .nav-bar { display: flex; align-items: center; gap: 24px; padding: 12px 0; border-bottom: 1px solid #eee; margin-bottom: 20px; }
    .nav-bar .logo { font-weight: 700; font-size: 18px; cursor: pointer; color: #4f8cff; }
    .nav-bar .nav-links { display: flex; gap: 16px; }
    .nav-bar a { cursor: pointer; color: #666; font-size: 14px; }
    .nav-bar a:hover { color: #4f8cff; }

    /* Home */
    .home-page h1 { font-size: 24px; margin-bottom: 8px; }
    .home-page p { color: #666; margin-bottom: 20px; }
    .nav-cards { display: flex; gap: 12px; }
    .card { flex: 1; background: #fff; border-radius: 8px; padding: 16px; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .card h3 { font-size: 16px; margin-bottom: 4px; }
    .card p { font-size: 13px; color: #999; }

    /* Todo */
    .todo-app { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .todo-app h1 { font-size: 20px; margin-bottom: 16px; }
    .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .input-row input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .input-row input:focus { outline: none; border-color: #4f8cff; }
    .input-row button { padding: 8px 16px; background: #4f8cff; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .input-row button:hover { background: #3a7aff; }
    .filters { display: flex; gap: 8px; margin-bottom: 16px; }
    .filters button { padding: 4px 12px; border: 1px solid #ddd; border-radius: 16px; background: #fff; cursor: pointer; font-size: 13px; }
    .filters button.active { background: #4f8cff; color: #fff; border-color: #4f8cff; }
    .todo-list { margin-bottom: 16px; }
    .todo-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .todo-item.done span { text-decoration: line-through; color: #999; }
    .todo-item input[type="checkbox"] { cursor: pointer; }
    .empty { color: #999; text-align: center; padding: 20px 0; font-size: 14px; }
    .clear { padding: 6px 16px; background: #ff4d4f; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }

    /* About */
    .about-page { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .about-page h1 { font-size: 20px; margin-bottom: 12px; }
    .about-page ul { padding-left: 20px; margin-bottom: 12px; }
    .about-page li { margin-bottom: 4px; color: #555; }
    .about-page button { margin-top: 12px; padding: 8px 16px; background: #4f8cff; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .about-page button:hover { background: #3a7aff; }

    /* NotFound */
    .not-found { text-align: center; padding: 60px 0; }
    .not-found h1 { font-size: 48px; color: #ccc; }
    .not-found p { margin: 12px 0; color: #999; }
    .not-found button { padding: 8px 16px; background: #4f8cff; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
